name: Auto Translate UI

on:
  push:
    branches: [main]

jobs:
  translate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: npm install gettext-llm gettext-parser better-sqlite3

      - name: Extract keys
        run: node i18n/extract.js

      - name: LLM translate
        run: gettext-llm translate               --input i18n/messages.pot               --languages es               --config i18n/llm.config.yaml               --output i18n/
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}

      - name: Import into DB
        run: node scripts/import-po-to-sqlite.js

      - name: Commit translations
        run: |
          git config user.name 'PHPTX Bot'
          git config user.email 'bot@phptexas.org'
          git add i18n phptexas.db
          git commit -m 'Auto-update UI translations' || exit 0
          git push